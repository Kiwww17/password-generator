<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"> 
    <title>Document</title>
</head>
<body class="flex flex-col w-full justify-center items-center gap-8">

    <header>
        <h1 class="text-xl text-black font-extrabold text-center my-4">PASSWORD GENERATOR</h1>
    </header>

    <main class="max-w-75 h-fit p-4 shadow-black/25 shadow-lg rounded-md flex flex-col gap-4">
        <div>
            <label class="text-md font-semibold">Password Length :</label>
            <br>
            <div class="flex flex-row gap-4 w-full h-fit justify-center">   
                <input type="range" class="w-10/12" value="0" id="inputRange" min="1" max="64">
                <input type="number" class="w-2/12 border-2 border-black rounded-sm text-center" value="1" id="inputInp" min="0" max="64">
            </div>
            <p class="text-[10px] text-red-500">*Max 64 char</p>
        </div>

        <div class="w-full h-fit flex justify-center items-center">
            <button class="text-sm bg-slate-600 p-1 rounded-sm text-white cursor-pointer" id="generateBtn">GENERATE PASSWORD</button>
        </div>
        <div class="w-full h-fit p-2 flex flex-col gap-4 ">
            <div class="flex justify-between items-center w-full h-fit">
                <label class="text-md text-black font-semibold">Your Password :</label>
                <p class="text-sm cursor-pointer" id="copy" title="copy">📋</p>
            </div>
            <input readonly class="w-full border-2 border-black/60 h-30 rounded-sm relative text-wrap mb-4" id="display">
            
            <button type="button" id="regenerateBtn" class="text-sm w-fit h-fit text-center p-1 bg-slate-600 rounded-sm text-white mt-6 mx-auto">🔄️ Regenerate</button>
        </div>
    </main>
    
    
    <script src="script.js"></script>
</body>
</html>
